<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning Ball Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050508;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button.danger {
            background: linear-gradient(135deg, #ff4757, #cc0033);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        button.danger:hover {
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.5);
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 12px;
            opacity: 0.7;
        }

        .title {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .title span {
            color: #00d4ff;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="title">Electric <span>Plasma</span></div>
    <div class="info">Move mouse to control • Click to discharge</div>
    
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <button onclick="changeColor('blue')">Blue</button>
        <button onclick="changeColor('purple')">Purple</button>
        <button onclick="changeColor('green')">Green</button>
        <button onclick="changeColor('orange')">Orange</button>
        <button class="danger" onclick="dischargeAll()">DISCHARGE</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Configuration
        const config = {
            centerX: canvas.width / 2,
            centerY: canvas.height / 2,
            ballRadius: 120,
            lightningCount: 8,
            branchProbability: 0.3,
            color: { r: 0, g: 212, b: 255 },
            glowIntensity: 20,
            rotationSpeed: 0.02
        };

        // Mouse tracking
        let mouse = { x: config.centerX, y: config.centerY };
        let target = { x: config.centerX, y: config.centerY };

        canvas.addEventListener('mousemove', (e) => {
            target.x = e.clientX;
            target.y = e.clientY;
        });

        canvas.addEventListener('click', (e) => {
            createExplosion(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            target.x = e.touches[0].clientX;
            target.y = e.touches[0].clientY;
        });

        // Classes
        class Lightning {
            constructor(angle, length, thickness, generation = 0) {
                this.angle = angle;
                this.length = length;
                this.thickness = thickness;
                this.generation = generation;
                this.segments = [];
                this.branches = [];
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.03;
                this.generate();
            }

            generate() {
                this.segments = [];
                let currentX = config.centerX + Math.cos(this.angle) * config.ballRadius * 0.8;
                let currentY = config.centerY + Math.sin(this.angle) * config.ballRadius * 0.8;
                
                const segmentCount = 8 + Math.floor(Math.random() * 8);
                const angleVariation = 0.3;

                for (let i = 0; i < segmentCount; i++) {
                    const progress = i / segmentCount;
                    const remainingLength = this.length * (1 - progress);
                    
                    const segmentAngle = this.angle + (Math.random() - 0.5) * angleVariation;
                    const segLength = remainingLength / (segmentCount - i) * (0.5 + Math.random());
                    
                    const endX = currentX + Math.cos(segmentAngle) * segLength;
                    const endY = currentY + Math.sin(segmentAngle) * segLength;
                    
                    this.segments.push({
                        x1: currentX,
                        y1: currentY,
                        x2: endX,
                        y2: endY,
                        thickness: this.thickness * (1 - progress * 0.7)
                    });

                    // Create branches
                    if (Math.random() < config.branchProbability && this.generation < 2) {
                        const branchAngle = segmentAngle + (Math.random() - 0.5) * 1.5;
                        const branchLength = remainingLength * 0.4;
                        const branch = new Lightning(branchAngle, branchLength, 
                            this.thickness * 0.5, this.generation + 1);
                        branch.startX = endX;
                        branch.startY = endY;
                        this.branches.push(branch);
                    }

                    currentX = endX;
                    currentY = endY;
                }
            }

            update() {
                this.life -= this.decay;
                this.branches.forEach(branch => branch.update());
                
                // Regenerate for animation effect
                if (Math.random() < 0.1 && this.life > 0.5) {
                    this.generate();
                }
            }

            draw(ctx) {
                if (this.life <= 0) return;

                ctx.save();
                ctx.globalAlpha = this.life;
                
                // Draw main lightning
                this.drawSegments(ctx, this.segments, this.thickness);
                
                // Draw branches
                this.branches.forEach(branch => branch.draw(ctx));
                
                ctx.restore();
            }

            drawSegments(ctx, segments, baseThickness) {
                segments.forEach((seg, i) => {
                    const glow = config.glowIntensity * this.life;
                    
                    // Outer glow
                    ctx.beginPath();
                    ctx.moveTo(seg.x1, seg.y1);
                    ctx.lineTo(seg.x2, seg.y2);
                    ctx.strokeStyle = `rgba(${config.color.r}, ${config.color.g}, ${config.color.b}, 0.3)`;
                    ctx.lineWidth = seg.thickness * 4 * this.life;
                    ctx.lineCap = 'round';
                    ctx.stroke();

                    // Middle glow
                    ctx.beginPath();
                    ctx.moveTo(seg.x1, seg.y1);
                    ctx.lineTo(seg.x2, seg.y2);
                    ctx.strokeStyle = `rgba(${config.color.r}, ${config.color.g}, ${config.color.b}, 0.6)`;
                    ctx.lineWidth = seg.thickness * 2 * this.life;
                    ctx.stroke();

                    // Core
                    ctx.beginPath();
                    ctx.moveTo(seg.x1, seg.y1);
                    ctx.lineTo(seg.x2, seg.y2);
                    ctx.strokeStyle = `rgb(255, 255, 255)`;
                    ctx.lineWidth = seg.thickness * this.life;
                    ctx.stroke();
                });
            }
        }

        class Particle {
            constructor(x, y, type = 'spark') {
                this.x = x;
                this.y = y;
                this.type = type;
                const angle = Math.random() * Math.PI * 2;
                const speed = type === 'explosion' ? Math.random() * 15 + 5 : Math.random() * 3 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = type === 'explosion' ? 0.02 : 0.01 + Math.random() * 0.02;
                this.size = type === 'explosion' ? Math.random() * 4 + 2 : Math.random() * 2 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                
                ctx.save();
                ctx.globalAlpha = this.life;
                
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.life})`);
                gradient.addColorStop(0.5, `rgba(${config.color.r}, ${config.color.g}, ${config.color.b}, ${this.life * 0.8})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        class PlasmaBall {
            constructor() {
                this.pulse = 0;
                this.pulseSpeed = 0.05;
                this.rotation = 0;
                this.lightnings = [];
                this.particles = [];
            }

            update() {
                // Smooth follow mouse
                config.centerX += (target.x - config.centerX) * 0.1;
                config.centerY += (target.y - config.centerY) * 0.1;

                // Pulse animation
                this.pulse += this.pulseSpeed;
                this.rotation += config.rotationSpeed;

                // Spawn new lightnings
                if (this.lightnings.length < config.lightningCount) {
                    const angle = Math.random() * Math.PI * 2;
                    const length = 100 + Math.random() * 150;
                    const thickness = 2 + Math.random() * 3;
                    this.lightnings.push(new Lightning(angle, length, thickness));
                }

                // Update lightnings
                this.lightnings = this.lightnings.filter(l => {
                    l.update();
                    return l.life > 0;
                });

                // Spawn particles
                if (Math.random() < 0.3) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = config.ballRadius * (0.8 + Math.random() * 0.4);
                    const px = config.centerX + Math.cos(angle) * r;
                    const py = config.centerY + Math.sin(angle) * r;
                    this.particles.push(new Particle(px, py));
                }

                // Update particles
                this.particles = this.particles.filter(p => {
                    p.update();
                    return p.life > 0;
                });
            }

            draw(ctx) {
                const pulseScale = 1 + Math.sin(this.pulse) * 0.05;
                const currentRadius = config.ballRadius * pulseScale;

                // Draw outer glow rings
                for (let i = 3; i > 0; i--) {
                    const gradient = ctx.createRadialGradient(
                        config.centerX, config.centerY, 0,
                        config.centerX, config.centerY, currentRadius * (1 + i * 0.5)
                    );
                    gradient.addColorStop(0, `rgba(${config.color.r}, ${config.color.g}, ${config.color.b}, ${0.1 / i})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(config.centerX, config.centerY, currentRadius * (1 + i * 0.5), 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw plasma core
                const coreGradient = ctx.createRadialGradient(
                    config.centerX, config.centerY, 0,
                    config.centerX, config.centerY, currentRadius
                );
                coreGradient.addColorStop(0, `rgba(255, 255, 255, 0.9)`);
                coreGradient.addColorStop(0.3, `rgba(${config.color.r}, ${config.color.g}, ${config.color.b}, 0.8)`);
                coreGradient.addColorStop(0.7, `rgba(${config.color.r}, ${config.color.g}, ${config.color.b}, 0.3)`);
                coreGradient.addColorStop(1, 'transparent');

                ctx.fillStyle = coreGradient;
                ctx.beginPath();
                ctx.arc(config.centerX, config.centerY, currentRadius, 0, Math.PI * 2);
                ctx.fill();

                // Draw energy rings
                ctx.save();
                ctx.translate(config.centerX, config.centerY);
                ctx.rotate(this.rotation);
                
                for (let i = 0; i < 3; i++) {
                    ctx.rotate(Math.PI * 2 / 3);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, currentRadius * 0.9, currentRadius * 0.3, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(${config.color.r}, ${config.color.g}, ${config.color.b}, 0.3)`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                ctx.restore();

                // Draw lightnings
                this.lightnings.forEach(l => l.draw(ctx));

                // Draw particles
                this.particles.forEach(p => p.draw(ctx));

                // Draw center glow
                const centerGlow = ctx.createRadialGradient(
                    config.centerX, config.centerY, 0,
                    config.centerX, config.centerY, 30
                );
                centerGlow.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                centerGlow.addColorStop(1, 'transparent');
                
                ctx.fillStyle = centerGlow;
                ctx.beginPath();
                ctx.arc(config.centerX, config.centerY, 30, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Global objects
        const plasmaBall = new PlasmaBall();
        let explosions = [];

        function createExplosion(x, y) {
            for (let i = 0; i < 50; i++) {
                plasmaBall.particles.push(new Particle(x, y, 'explosion'));
            }
            
            // Create radial lightning burst
            for (let i = 0; i < 12; i++) {
                const angle = (Math.PI * 2 / 12) * i;
                const lightning = new Lightning(angle, 200, 4);
                lightning.startX = x;
                lightning.startY = y;
                plasmaBall.lightnings.push(lightning);
            }
        }

        function dischargeAll() {
            createExplosion(config.centerX, config.centerY);
            config.lightningCount = 20;
            setTimeout(() => {
                config.lightningCount = 8;
            }, 1000);
        }

        function changeColor(colorName) {
            const colors = {
                blue: { r: 0, g: 212, b: 255 },
                purple: { r: 147, g: 51, b: 234 },
                green: { r: 34, g: 197, b: 94 },
                orange: { r: 249, g: 115, b: 22 },
                red: { r: 239, g: 68, b: 68 }
            };
            
            if (colors[colorName]) {
                // Animate color transition
                const startColor = { ...config.color };
                const endColor = colors[colorName];
                let progress = 0;
                
                function animateColor() {
                    progress += 0.05;
                    if (progress >= 1) {
                        config.color = endColor;
                        return;
                    }
                    
                    config.color.r = Math.round(startColor.r + (endColor.r - startColor.r) * progress);
                    config.color.g = Math.round(startColor.g + (endColor.g - startColor.g) * progress);
                    config.color.b = Math.round(startColor.b + (endColor.b - startColor.b) * progress);
                    
                    requestAnimationFrame(animateColor);
                }
                
                animateColor();
            }
        }

        // Animation loop
        function animate() {
            // Clear with trail effect
            ctx.fillStyle = 'rgba(5, 5, 8, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            plasmaBall.update();
            plasmaBall.draw(ctx);

            requestAnimationFrame(animate);
        }

        // Start
        animate();

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case ' ':
                    e.preventDefault();
                    dischargeAll();
                    break;
                case '1':
                    changeColor('blue');
                    break;
                case '2':
                    changeColor('purple');
                    break;
                case '3':
                    changeColor('green');
                    break;
                case '4':
                    changeColor('orange');
                    break;
            }
        });
    </script>
</body>
</html>
